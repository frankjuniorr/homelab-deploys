apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-wildcard
  namespace: default
spec:
  secretName: homelab-wildcard-tls
  issuerRef:
    name: local-issuer # Nome do ClusterIssuer que criamos antes
    kind: ClusterIssuer
  commonName: "*.frank.lab.io"
  dnsNames:
  - "frank.lab.io"
  - "*.frank.lab.io"
