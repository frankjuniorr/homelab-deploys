---
##############################################
# Cluster Setup
# Bootstraps the full K3s cluster infrastructure:
# Gateway API CRDs → Helm charts (MetalLB, Envoy, cert-manager)
# → base configs (IP pool, Gateway, TLS CA, wildcard cert) → Root CA local trust
##############################################
- name: "Bootstrap K3s cluster infrastructure"
  hosts: localhost
  connection: local
  gather_facts: true   # Required by root-ca-trust.yml for OS detection (ansible_distribution)
  become: false
  tags:
    - setup
    - infra

  roles:
    - role: cluster-setup
      tags:
        - setup
        - infra

##############################################
# Proxmox Host Monitoring
# Installs node_exporter + VM/LXC metrics script on the Proxmox host via SSH.
# Also applies the Grafana dashboard ConfigMap to the K3s cluster (delegate_to: localhost).
##############################################
- name: "Install node_exporter on Proxmox host"
  hosts: proxmox_node
  gather_facts: false
  become: true
  tags:
    - setup
    - proxmox-node

  roles:
    - role: proxmox-node
      tags:
        - setup
        - proxmox-node

##############################################
# Applications
# Each application is its own role. Role name = namespace name (convention).
# Add new apps by creating a new role under src/roles/<app-name>/ and listing it here.
##############################################
- name: "Deploy applications"
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  tags:
    - setup
    - apps

  roles:
    - role: postgres
      tags:
        - setup
        - apps
        - postgres

    - role: longhorn
      tags:
        - setup
        - apps
        - longhorn

    - role: podinfo
      tags:
        - setup
        - apps
        - podinfo

    - role: monitoring
      tags:
        - setup
        - apps
        - monitoring

    - role: grafana
      tags:
        - setup
        - apps
        - grafana
