---
- name: "Load app configuration from apps registry (group_vars/all.yml)"
  ansible.builtin.set_fact:
    app: "{{ apps | selectattr('name', 'eq', 'linkding') | first }}"

- name: "Deploy linkding resources (namespace | secret | deployment | service | httproute)"
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', role_path + '/templates/' + item) | from_yaml_all | list }}"
  loop:
    - namespace.yaml.j2
    - secret.yaml.j2
    - deployment.yaml.j2
    - service.yaml.j2
    - httproute.yaml.j2
  loop_control:
    label: "{{ item }}"
