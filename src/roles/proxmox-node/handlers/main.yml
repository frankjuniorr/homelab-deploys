---
- name: "Restart node_exporter"
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted
    daemon_reload: false

- name: "Reload systemd and restart node_exporter"
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted
    daemon_reload: true

- name: "Reload systemd"
  ansible.builtin.systemd:
    daemon_reload: true

- name: "Restart proxmox-vm-metrics timer"
  ansible.builtin.systemd:
    name: proxmox-vm-metrics.timer
    state: restarted
    daemon_reload: false
