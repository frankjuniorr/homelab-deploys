---
##############################################
# POSTGRES ROLE
# Deploys the CloudNativePG operator (cnpg-system) and a 2-instance
# PostgreSQL cluster (1 primary + 1 replica) in the postgres namespace.
#
# External access: MetalLB LoadBalancer at postgres_lb_ip:5432 (primary only)
# Storage: Longhorn PVC per instance (postgres_storage_size each)
#
# Backup: barman-cloud pushes pg_basebackup + WAL to s3://homelab-cnpg/ daily at 2 AM.
# Recovery: if the S3 bucket has content, bootstrap uses recovery instead of initdb —
#           enabling automatic restore on destroy → deploy cycles.
##############################################

- name: "Add CloudNativePG Helm repo"
  ansible.builtin.command:
    cmd: helm repo add cnpg https://cloudnative-pg.github.io/charts --force-update
  changed_when: false

- name: "Update Helm repo cache"
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: false

- name: "Install CloudNativePG operator"
  ansible.builtin.command:
    cmd: >
      helm upgrade --install cnpg-system cloudnative-pg
      --repo https://cloudnative-pg.github.io/charts
      --namespace {{ namespace_cnpg }}
      --create-namespace
      --version {{ cnpg_version }}
      --wait
      --set resources.requests.cpu={{ cnpg_req_cpu }}
      --set resources.requests.memory={{ cnpg_req_mem }}
      --set resources.limits.cpu={{ cnpg_lim_cpu }}
      --set resources.limits.memory={{ cnpg_lim_mem }}
  register: helm_cnpg
  changed_when: "'has been upgraded' in helm_cnpg.stdout or 'has been installed' in helm_cnpg.stdout"

- name: "Wait for CloudNativePG Cluster CRD to be established"
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: clusters.postgresql.cnpg.io
  register: cnpg_crd_check
  until: >
    cnpg_crd_check.resources | length > 0 and
    (cnpg_crd_check.resources[0].status.conditions |
      selectattr('type', 'eq', 'Established') |
      selectattr('status', 'eq', 'True') | list | length > 0)
  retries: 18
  delay: 5

- name: "Wait for CNPG Cluster API endpoint to be ready (cache warmup after CRD reinstall)"
  kubernetes.core.k8s_info:
    api_version: postgresql.cnpg.io/v1
    kind: Cluster
  register: cnpg_api_check
  until: cnpg_api_check is not failed
  retries: 12
  delay: 5

- name: "Check if CNPG backup exists in stable bucket (recovery source)"
  ansible.builtin.command:
    cmd: >
      aws s3 ls s3://{{ cnpg_backup_bucket }}/
      --endpoint-url {{ garage_s3_endpoint }}
  register: cnpg_s3_check
  changed_when: false
  failed_when: false

- name: "Set fact: CNPG backup exists"
  ansible.builtin.set_fact:
    cnpg_backup_exists: "{{ cnpg_s3_check.stdout | length > 0 }}"

- name: "Deploy postgres pre-cluster resources (storageclass | namespace | backup-secret)"
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', role_path + '/templates/' + item) | from_yaml }}"
  loop:
    - storageclass.yaml.j2
    - namespace.yaml.j2
    - cnpg-backup-secret.yaml.j2
  loop_control:
    label: "{{ item }}"

- name: "Check if postgres cluster already exists"
  kubernetes.core.k8s_info:
    api_version: postgresql.cnpg.io/v1
    kind: Cluster
    name: postgres
    namespace: "{{ namespace_postgres }}"
  register: existing_cluster

- name: "Deploy postgres cluster (skipped if already exists to avoid bootstrap immutability)"
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', role_path + '/templates/cluster.yaml.j2') | from_yaml }}"
  when: existing_cluster.resources | length == 0

- name: "Deploy postgres LoadBalancer service"
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', role_path + '/templates/service-lb.yaml.j2') | from_yaml }}"

- name: "Wait for PostgreSQL cluster to be ready"
  kubernetes.core.k8s_info:
    api_version: postgresql.cnpg.io/v1
    kind: Cluster
    name: postgres
    namespace: "{{ namespace_postgres }}"
  register: cluster_check
  until: >
    cluster_check.resources | length > 0 and
    (cluster_check.resources[0].status.readyInstances | default(0) | int) == postgres_instances
  retries: 90
  delay: 10

- name: "Deploy CNPG ScheduledBackup (daily → S3)"
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', role_path + '/templates/cnpg-scheduled-backup.yaml.j2') | from_yaml }}"

- name: "Deploy PgAdmin4 resources (secret | pvc | deployment | service | httproute)"
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', role_path + '/templates/' + item) | from_yaml }}"
  loop:
    - pgadmin-secret.yaml.j2
    - pgadmin-pvc.yaml.j2
    - pgadmin-deployment.yaml.j2
    - pgadmin-service.yaml.j2
    - pgadmin-httproute.yaml.j2
  loop_control:
    label: "{{ item }}"
