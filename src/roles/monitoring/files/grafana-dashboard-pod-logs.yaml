apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-pod-logs
  namespace: grafana
  labels:
    grafana_dashboard: "1"
data:
  pod-logs.json: |
    {
      "annotations": { "list": [] },
      "description": "Per-pod log explorer — filter by namespace, pod and container",
      "editable": true,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "loki", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": { "custom": { "lineWidth": 1 } },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "${datasource}" },
              "expr": "sum by(container) (rate({namespace=\"$namespace\", pod=~\"$pod\"}[$__interval]))",
              "legendFormat": "{{container}}",
              "refId": "A"
            }
          ],
          "title": "Log Rate by Container",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "loki", "uid": "${datasource}" },
          "gridPos": { "h": 20, "w": 24, "x": 0, "y": 8 },
          "id": 2,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "${datasource}" },
              "expr": "{namespace=\"$namespace\", pod=~\"$pod\", container=~\"$container\"}",
              "refId": "A"
            }
          ],
          "title": "Pod Logs",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["loki", "logs", "homelab", "pods"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Loki Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "loki",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": {},
            "datasource": { "type": "loki", "uid": "${datasource}" },
            "hide": 0,
            "includeAll": false,
            "label": "Namespace",
            "multi": false,
            "name": "namespace",
            "options": [],
            "query": { "label": "namespace", "stream": "", "type": 1 },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "allValue": ".+",
            "current": {},
            "datasource": { "type": "loki", "uid": "${datasource}" },
            "hide": 0,
            "includeAll": true,
            "label": "Pod",
            "multi": true,
            "name": "pod",
            "options": [],
            "query": { "label": "pod", "stream": "{namespace=\"$namespace\"}", "type": 1 },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "allValue": ".+",
            "current": {},
            "datasource": { "type": "loki", "uid": "${datasource}" },
            "hide": 0,
            "includeAll": true,
            "label": "Container",
            "multi": true,
            "name": "container",
            "options": [],
            "query": { "label": "container", "stream": "{namespace=\"$namespace\", pod=~\"$pod\"}", "type": 1 },
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Pod Logs",
      "uid": "homelab-pod-logs",
      "version": 1
    }
