---

##############################################################
# Privilege escalation — valor real fica em vault.yml (criptografado)
##############################################################
ansible_become_pass: "{{ vault_become_pass }}"

##############################################################
# Namespaces
##############################################################
namespace_metallb: metallb-system
namespace_envoy: envoy-gateway-system
namespace_cert_manager: cert-manager
namespace_gateway: gateway        # Gateway instance + wildcard TLS cert
monitoring_namespace: monitoring  # Prometheus + Grafana (kube-prometheus-stack)
longhorn_namespace: longhorn-system

##############################################################
# Versions
##############################################################
gateway_api_version: v1.4.1
envoy_gateway_version: v1.7.1
metallb_version: v0.15.3
cert_manager_version: v1.20.1
kube_prometheus_stack_version: "69.7.4"
longhorn_version: "1.7.2"
loki_version: "6.55.0"
promtail_version: "6.16.6"

##############################################################
# Domains
##############################################################
# Internal domain — all services are exposed under *.{{ homelab_domain }}
homelab_domain: frank.lab.io
monitoring_grafana_domain: "grafana.{{ homelab_domain }}"
monitoring_prometheus_domain: "prometheus.{{ homelab_domain }}"
longhorn_domain: "longhorn.{{ homelab_domain }}"

##############################################################
# Gateway API (Ingress)
##############################################################
gateway_name: my-gateway
gateway_class_name: envoy-gateway-class
gateway_api_crds_url: "https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ gateway_api_version }}/standard-install.yaml"

##############################################################
# MetalLB
##############################################################
metallb_ip_pool: "192.168.1.200-192.168.1.205"

##############################################################
# Certificate TLS
##############################################################
ca_secret_name: homelab-ca-tls
ca_secret_namespace: "{{ namespace_cert_manager }}"
wildcard_tls_secret_name: homelab-wildcard-tls
homelab_ca_cn: "Homelab Internal Root CA"

# Path where the Root CA PEM is written on the local machine (relative to playbook_dir = src/)
ca_cert_local_path: "{{ playbook_dir }}/homelab-root-ca.crt"

##############################################################
# Longhorn Backup (Garage S3 — LXC on Proxmox)
##############################################################
longhorn_backup_bucket: homelab-longhorn
longhorn_backup_region: homelab
longhorn_backup_target: "s3://{{ longhorn_backup_bucket }}@{{ longhorn_backup_region }}/"
longhorn_backup_credential_secret: longhorn-backup-secret
longhorn_s3_endpoint: "http://192.168.1.52:3900"
longhorn_backup_access_key: "{{ vault_longhorn_backup_access_key }}"
longhorn_backup_secret_key: "{{ vault_longhorn_backup_secret_key }}"

##############################################################
# Monitoring (kube-prometheus-stack)
##############################################################
# Admin password comes from vault.yml — add via: just secrets-edit
grafana_admin_password: "{{ vault_grafana_admin_password }}"

##############################################################
# Resource limits (tune here to control cluster RAM usage)
##############################################################
# Prometheus
prometheus_retention:  "5d"
prometheus_req_cpu:    "100m"
prometheus_req_mem:    "256Mi"
prometheus_lim_cpu:    "500m"
prometheus_lim_mem:    "512Mi"

# Grafana
grafana_req_cpu:       "50m"
grafana_req_mem:       "128Mi"
grafana_lim_cpu:       "200m"
grafana_lim_mem:       "300Mi"

# Alertmanager
alertmanager_req_cpu:  "10m"
alertmanager_req_mem:  "32Mi"
alertmanager_lim_cpu:  "100m"
alertmanager_lim_mem:  "64Mi"

# Loki
loki_retention:        "72h"
loki_req_cpu:          "50m"
loki_req_mem:          "64Mi"
loki_lim_cpu:          "200m"
loki_lim_mem:          "128Mi"

# Longhorn manager (per node — 3 nodes in cluster)
longhorn_manager_req_cpu:  "50m"
longhorn_manager_req_mem:  "100Mi"
longhorn_manager_lim_cpu:  "300m"
longhorn_manager_lim_mem:  "200Mi"

##############################################################
# Applications registry
##############################################################
# Each entry drives the role of the same name: role name = namespace name = app name.
# Add new apps here; each one gets its own role under src/roles/<name>/.
apps:
  - name: podinfo
    namespace: podinfo
    domain: hello.{{ homelab_domain }}
