---

##############################################################
# Privilege escalation — valor real fica em vault.yml (criptografado)
##############################################################
ansible_become_pass: "{{ vault_become_pass }}"

##############################################################
# Namespaces
##############################################################
namespace_metallb: metallb-system
namespace_envoy: envoy-gateway-system
namespace_cert_manager: cert-manager
namespace_gateway: gateway        # Gateway instance + wildcard TLS cert
namespace_prometheus: prometheus   # kube-prometheus-stack (Prometheus + Alertmanager)
namespace_grafana: grafana         # Grafana (standalone)
namespace_loki: loki               # Loki + Promtail
longhorn_namespace: longhorn-system

##############################################################
# Versions
##############################################################
gateway_api_version: v1.5.1
envoy_gateway_version: v1.7.1
metallb_version: v0.15.3
cert_manager_version: v1.20.2
kube_prometheus_stack_version: "83.7.0"
longhorn_version: "1.11.1"
loki_version: "6.55.0"
promtail_version: "6.17.1"
grafana_version: "10.5.15"
node_exporter_version: "1.11.1"

##############################################################
# Domains
##############################################################
# Internal domain — all services are exposed under *.{{ homelab_domain }}
homelab_domain: frank.lab.io
monitoring_grafana_domain: "grafana.{{ homelab_domain }}"
monitoring_prometheus_domain: "prometheus.{{ homelab_domain }}"
longhorn_domain: "longhorn.{{ homelab_domain }}"

##############################################################
# Gateway API (Ingress)
##############################################################
gateway_name: my-gateway
gateway_class_name: envoy-gateway-class
gateway_api_crds_url: "https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ gateway_api_version }}/standard-install.yaml"

##############################################################
# MetalLB
##############################################################
metallb_ip_pool: "192.168.1.200-192.168.1.205"

##############################################################
# Certificate TLS
##############################################################
ca_secret_name: homelab-ca-tls
ca_secret_namespace: "{{ namespace_cert_manager }}"
wildcard_tls_secret_name: homelab-wildcard-tls
homelab_ca_cn: "Homelab Internal Root CA"

# Path where the Root CA PEM is written on the local machine (relative to playbook_dir = src/)
ca_cert_local_path: "{{ playbook_dir }}/homelab-root-ca.crt"

##############################################################
# Garage S3 (LXC on Proxmox — shared endpoint and credentials for all buckets)
# Credentials read from ~/.aws/credentials (profile: default)
# Generated by homelab-iac; do not hardcode here.
##############################################################
garage_s3_endpoint: "http://192.168.1.52:3900"
garage_s3_access_key: "{{ lookup('ini', 'aws_access_key_id section=default file=~/.aws/credentials') }}"
garage_s3_secret_key: "{{ lookup('ini', 'aws_secret_access_key section=default file=~/.aws/credentials') }}"

##############################################################
# Longhorn Backup (Garage S3 — bucket: homelab-longhorn)
# Backup target stays configured for manual snapshots; scheduling removed
# (Velero handles automated backup/restore — see section below)
##############################################################
longhorn_backup_bucket: homelab-longhorn
longhorn_backup_region: homelab
longhorn_backup_target: "s3://{{ longhorn_backup_bucket }}@{{ longhorn_backup_region }}/"
longhorn_backup_credential_secret: longhorn-backup-secret

##############################################################
# Velero Backup/Restore (Garage S3 — bucket: homelab-velero)
# Backs up K8s resources + PVC data (Kopia file-system backup)
##############################################################
velero_namespace: velero
velero_version: "10.1.3"
velero_plugin_aws_version: "v1.12.2"
velero_kubectl_image_tag: "1.33"
velero_backup_bucket: homelab-velero
velero_backup_region: homelab
velero_schedule_cron: "0 1 * * *"   # 1 AM every day (must run before 2:30 AM GarageS3→Drive sync)
velero_backup_ttl: "720h"            # 30 days retention

##############################################################
# Proxmox Host Monitoring
##############################################################
proxmox_host_ip: "192.168.1.115"

##############################################################
# Monitoring (kube-prometheus-stack)
##############################################################
# Admin password comes from vault.yml — add via: just secrets-edit
grafana_admin_password: "{{ vault_grafana_admin_password }}"

##############################################################
# Resource limits (tune here to control cluster RAM usage)
##############################################################
# Prometheus
prometheus_scrape_interval: "60s"
prometheus_eval_interval:   "60s"
prometheus_retention:  "5d"
prometheus_req_cpu:    "100m"
prometheus_req_mem:    "256Mi"
prometheus_lim_cpu:    "500m"
prometheus_lim_mem:    "512Mi"

# Grafana
grafana_req_cpu:       "50m"
grafana_req_mem:       "128Mi"
grafana_lim_cpu:       "200m"
grafana_lim_mem:       "300Mi"

# Alertmanager
alertmanager_req_cpu:  "10m"
alertmanager_req_mem:  "32Mi"
alertmanager_lim_cpu:  "100m"
alertmanager_lim_mem:  "64Mi"

# Loki
loki_retention:        "72h"
loki_req_cpu:          "50m"
loki_req_mem:          "64Mi"
loki_lim_cpu:          "200m"
loki_lim_mem:          "128Mi"

# Longhorn volumes (replica count across workers)
longhorn_default_replica_count: 2
longhorn_min_available_pct: 15
longhorn_over_provisioning_pct: 200

# Longhorn manager (per node — 3 nodes in cluster)
longhorn_manager_req_cpu:  "50m"
longhorn_manager_req_mem:  "100Mi"
longhorn_manager_lim_cpu:  "300m"
longhorn_manager_lim_mem:  "200Mi"

##############################################################
# Persistent storage sizes (Longhorn PVCs)
##############################################################
prometheus_storage_size:   "10Gi"
loki_storage_size:         "10Gi"
grafana_storage_size:      "1Gi"

##############################################################
# CloudNativePG + PostgreSQL
##############################################################
namespace_cnpg: cnpg-system
namespace_postgres: postgres
cnpg_version: "0.28.0"
postgres_instances: 2
postgres_storage_size: "10Gi"
postgres_lb_ip: "192.168.1.201"

# CloudNativePG operator resources
cnpg_req_cpu: "50m"
cnpg_req_mem: "128Mi"
cnpg_lim_cpu: "200m"
cnpg_lim_mem: "256Mi"

# PostgreSQL pod resources (applied per instance)
postgres_req_cpu: "100m"
postgres_req_mem: "256Mi"
postgres_lim_cpu: "500m"
postgres_lim_mem: "512Mi"

##############################################################
# PgAdmin4 (deployed in postgres namespace as a frontend for CloudNativePG)
##############################################################
pgadmin_version: "9.14"
pgadmin_domain: "pgadmin.{{ homelab_domain }}"
pgadmin_storage_size: "512Mi"
pgadmin_req_cpu: "50m"
pgadmin_req_mem: "128Mi"
pgadmin_lim_cpu: "200m"
pgadmin_lim_mem: "256Mi"

##############################################################
# Applications registry
##############################################################
# Each entry drives the role of the same name: role name = namespace name = app name.
# Add new apps here; each one gets its own role under src/roles/<name>/.
apps:
  - name: podinfo
    namespace: podinfo
    domain: hello.{{ homelab_domain }}
