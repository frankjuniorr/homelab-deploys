---
##############################################
# DESTROY
# Removes all Kubernetes namespaces created by homelab-deploys,
# effectively wiping all workloads from the cluster.
# Also removes node_exporter from the Proxmox host.
#
# Usage: just destroy
# WARNING: This is irreversible. Run `just deploy` to restore the full stack.
#
# Pre-cleanup order (learned from stuck-namespace troubleshooting):
# 1. Delete operator webhooks (Longhorn + CNPG) — they block CR deletion after operator is gone
# 2. Strip finalizers from Longhorn CRs — controller is gone and can't process them
# 3. Strip finalizers from CNPG Database CRs — same reason
# 4. Strip PVC protection finalizers — pods are gone but finalizer still blocks deletion
# 5. Delete all namespaces
# 6. Wait until all namespaces are fully terminated (safe for subsequent `just deploy`)
##############################################

- name: "Uninstall node_exporter from Proxmox host"
  hosts: proxmox_node
  gather_facts: false
  become: true

  tasks:
    - name: "Stop and disable systemd units"
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - proxmox-vm-metrics.timer
        - node_exporter
      loop_control:
        label: "{{ item }}"
      failed_when: false

    - name: "Remove systemd unit files"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/node_exporter.service
        - /etc/systemd/system/proxmox-vm-metrics.service
        - /etc/systemd/system/proxmox-vm-metrics.timer
      loop_control:
        label: "{{ item }}"

    - name: "Reload systemd after unit removal"
      ansible.builtin.systemd:
        daemon_reload: true

    - name: "Remove binaries and textfile directory"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/local/bin/node_exporter
        - /usr/local/bin/proxmox-vm-metrics.sh
        - /var/lib/node_exporter
      loop_control:
        label: "{{ item }}"

    - name: "Remove node_exporter system user"
      ansible.builtin.user:
        name: node_exporter
        state: absent
      failed_when: false

- name: "Delete all cluster namespaces"
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  tasks:
    - name: "Build complete namespace list"
      ansible.builtin.set_fact:
        all_namespaces: >-
          {{ (apps | map(attribute='namespace') | list) + [
               namespace_postgres, namespace_cnpg,
               namespace_prometheus, namespace_grafana, namespace_loki,
               longhorn_namespace, namespace_gateway,
               namespace_cert_manager, namespace_metallb,
               namespace_envoy, velero_namespace
             ] }}

    - name: "Remove operator webhook configurations (Longhorn + CNPG)"
      kubernetes.core.k8s:
        state: absent
        api_version: admissionregistration.k8s.io/v1
        kind: "{{ item.kind }}"
        name: "{{ item.name }}"
      loop:
        - {kind: ValidatingWebhookConfiguration, name: longhorn-webhook-validator}
        - {kind: MutatingWebhookConfiguration,   name: longhorn-webhook-mutator}
        - {kind: ValidatingWebhookConfiguration, name: cnpg-validating-webhook-configuration}
        - {kind: MutatingWebhookConfiguration,   name: cnpg-mutating-webhook-configuration}
      loop_control:
        label: "{{ item.name }}"
      failed_when: false

    - name: "Remove finalizers from Longhorn CRs"
      ansible.builtin.shell:
        cmd: |
          kubectl get crd --no-headers 2>/dev/null | awk '{print $1}' \
            | grep '\.longhorn\.io$' | while read crd; do
            kubectl get "$crd" -n {{ longhorn_namespace }} -o name 2>/dev/null \
              | xargs -r -I{} kubectl patch {} -n {{ longhorn_namespace }} \
                -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null
          done
      changed_when: false
      failed_when: false

    - name: "Remove finalizers from CNPG Database CRs"
      ansible.builtin.shell:
        cmd: |
          kubectl get databases.postgresql.cnpg.io -n {{ namespace_postgres }} -o name 2>/dev/null \
            | xargs -r -I{} kubectl patch {} -n {{ namespace_postgres }} \
              -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null
      changed_when: false
      failed_when: false

    - name: "Remove finalizers from Velero CRs"
      ansible.builtin.shell:
        cmd: |
          kubectl get crd --no-headers 2>/dev/null | awk '{print $1}' \
            | grep '\.velero\.io$' | while read crd; do
            kubectl get "$crd" -n {{ velero_namespace }} -o name 2>/dev/null \
              | xargs -r -I{} kubectl patch {} -n {{ velero_namespace }} \
                -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null
          done
      changed_when: false
      failed_when: false

    - name: "Remove PVC protection finalizers from all homelab namespaces"
      ansible.builtin.shell:
        cmd: |
          for ns in {{ all_namespaces | join(' ') }}; do
            kubectl get pvc -n "$ns" -o name 2>/dev/null \
              | xargs -r -I{} kubectl patch {} -n "$ns" \
                -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null
          done
      changed_when: false
      failed_when: false

    - name: "Delete application namespaces"
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
      loop: "{{ apps | map(attribute='namespace') | list }}"
      loop_control:
        label: "{{ item }}"

    - name: "Delete infrastructure namespaces (except Longhorn — must wait for PVCs first)"
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
      loop:
        - "{{ namespace_postgres }}"
        - "{{ namespace_cnpg }}"
        - "{{ namespace_prometheus }}"
        - "{{ namespace_grafana }}"
        - "{{ namespace_loki }}"
        - "{{ namespace_gateway }}"
        - "{{ namespace_cert_manager }}"
        - "{{ namespace_metallb }}"
        - "{{ namespace_envoy }}"
        - "{{ velero_namespace }}"
      loop_control:
        label: "{{ item }}"

    - name: "Force-delete terminal pods blocking namespace termination"
      ansible.builtin.shell:
        cmd: |
          for ns in {{ all_namespaces | join(' ') }}; do
            kubectl get pods -n "$ns" \
              --field-selector='status.phase=Succeeded' -o name 2>/dev/null \
              | xargs -r kubectl delete --force --grace-period=0 -n "$ns" 2>/dev/null
            kubectl get pods -n "$ns" \
              --field-selector='status.phase=Failed' -o name 2>/dev/null \
              | xargs -r kubectl delete --force --grace-period=0 -n "$ns" 2>/dev/null
          done
      changed_when: false
      failed_when: false

    - name: "Re-strip Velero finalizers post-deletion (controller may have re-added them before shutdown)"
      ansible.builtin.shell:
        cmd: |
          kubectl get crd --no-headers 2>/dev/null | awk '{print $1}' \
            | grep '\.velero\.io$' | while read crd; do
            kubectl get "$crd" -n {{ velero_namespace }} -o name 2>/dev/null \
              | xargs -r -I{} kubectl patch {} -n {{ velero_namespace }} \
                -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null
          done
      changed_when: false
      failed_when: false

    - name: "Wait for all non-Longhorn namespaces to fully terminate"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
      register: ns_check
      until: ns_check.resources | length == 0
      retries: 60
      delay: 10
      loop: "{{ all_namespaces | reject('equalto', longhorn_namespace) | list }}"
      loop_control:
        label: "{{ item }}"

    - name: "Delete Longhorn namespace (after all PVC-using namespaces terminated — prevents orphaned volumes)"
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ longhorn_namespace }}"

    - name: "Wait for Longhorn namespace to fully terminate"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ longhorn_namespace }}"
      register: ns_check
      until: ns_check.resources | length == 0
      retries: 60
      delay: 10

    - name: "Delete Longhorn CRDs (stale webhookClientConfig causes re-install to fail)"
      ansible.builtin.shell:
        cmd: |
          kubectl get crd -o name 2>/dev/null | grep '\.longhorn\.io' \
            | xargs -r kubectl delete 2>/dev/null
      changed_when: false
      failed_when: false

    - name: "Delete CNPG CRDs (stale webhookClientConfig causes re-install to fail)"
      ansible.builtin.shell:
        cmd: |
          kubectl get crd -o name 2>/dev/null | grep '\.cnpg\.io\|\.postgresql\.cnpg\.io' \
            | xargs -r kubectl delete 2>/dev/null
      changed_when: false
      failed_when: false
