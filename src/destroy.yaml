---
##############################################
# DESTROY
# Removes all Kubernetes namespaces created by homelab-deploys,
# effectively wiping all workloads from the cluster.
#
# Usage: just destroy
# WARNING: This is irreversible. Run `just deploy` to restore the full stack.
##############################################

- name: "Delete all cluster namespaces"
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  tasks:
    - name: "Delete homelab namespaces"
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
      loop:
        - prometheus
        - grafana
        - loki
        - podinfo
        - gateway
        - cert-manager
        - metallb-system
        - envoy-gateway-system
        - longhorn-system
      loop_control:
        label: "{{ item }}"
