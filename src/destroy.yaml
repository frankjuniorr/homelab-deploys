---
##############################################
# DESTROY
# Removes all Kubernetes namespaces created by homelab-deploys,
# effectively wiping all workloads from the cluster.
# Also removes node_exporter from the Proxmox host.
#
# Usage: just destroy
# WARNING: This is irreversible. Run `just deploy` to restore the full stack.
#
# Pre-cleanup order (learned from stuck-namespace troubleshooting):
# 1. Delete operator webhooks (Longhorn + CNPG) — they block CR deletion after operator is gone
# 2. Strip finalizers from Longhorn CRs — controller is gone and can't process them
# 3. Strip finalizers from CNPG Database CRs — same reason
# 4. Strip PVC protection finalizers — pods are gone but finalizer still blocks deletion
# 5. Delete all namespaces
# 6. Wait until all namespaces are fully terminated (safe for subsequent `just deploy`)
##############################################

- name: "Uninstall node_exporter from Proxmox host"
  hosts: proxmox_node
  gather_facts: false
  become: true

  tasks:
    # node_exporter and its companion timer both need to stop before removing their unit files
    - name: "Stop and disable systemd units"
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - proxmox-vm-metrics.timer
        - node_exporter
      loop_control:
        label: "{{ item }}"
      failed_when: false

    # Remove unit files so systemd doesn't try to start them on next boot
    - name: "Remove systemd unit files"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/node_exporter.service
        - /etc/systemd/system/proxmox-vm-metrics.service
        - /etc/systemd/system/proxmox-vm-metrics.timer
      loop_control:
        label: "{{ item }}"

    # Required after removing unit files so systemd forgets the removed units
    - name: "Reload systemd after unit removal"
      ansible.builtin.systemd:
        daemon_reload: true

    # Clean up binaries and the textfile directory used by the Prometheus node_exporter
    - name: "Remove binaries and textfile directory"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/local/bin/node_exporter
        - /usr/local/bin/proxmox-vm-metrics.sh
        - /var/lib/node_exporter
      loop_control:
        label: "{{ item }}"

    # Remove the dedicated system user created during install
    - name: "Remove node_exporter system user"
      ansible.builtin.user:
        name: node_exporter
        state: absent
      failed_when: false

- name: "Delete all cluster namespaces"
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  tasks:
    # Build a flat list of all namespaces owned by homelab-deploys so subsequent tasks can iterate it
    - name: "Build complete namespace list"
      ansible.builtin.set_fact:
        all_namespaces: >-
          {{ (apps | map(attribute='namespace') | list) + [
               namespace_postgres, namespace_cnpg,
               namespace_prometheus, namespace_grafana, namespace_loki,
               longhorn_namespace, namespace_gateway,
               namespace_cert_manager, namespace_metallb,
               namespace_envoy, velero_namespace
             ] }}

    # Webhooks must be deleted BEFORE their operator namespaces are removed.
    # Without this, the admission webhook endpoints become unreachable after the operator pod
    # disappears, causing every CR deletion to hang waiting for a webhook that never responds.
    - name: "Remove operator webhook configurations (Longhorn + CNPG)"
      kubernetes.core.k8s:
        state: absent
        api_version: admissionregistration.k8s.io/v1
        kind: "{{ item.kind }}"
        name: "{{ item.name }}"
      loop:
        - {kind: ValidatingWebhookConfiguration, name: longhorn-webhook-validator}
        - {kind: MutatingWebhookConfiguration,   name: longhorn-webhook-mutator}
        - {kind: ValidatingWebhookConfiguration, name: cnpg-validating-webhook-configuration}
        - {kind: MutatingWebhookConfiguration,   name: cnpg-mutating-webhook-configuration}
      loop_control:
        label: "{{ item.name }}"
      failed_when: false

    # Longhorn CRs carry finalizers that only the Longhorn controller can remove.
    # Since the controller is about to be deleted with its namespace, we strip them manually
    # so the namespace termination isn't blocked waiting for the controller to run.
    - name: "Remove finalizers from Longhorn CRs"
      ansible.builtin.shell:
        cmd: |
          kubectl get crd --no-headers 2>/dev/null | awk '{print $1}' \
            | grep '\.longhorn\.io$' | while read crd; do
            kubectl get "$crd" -n {{ longhorn_namespace }} -o name 2>/dev/null \
              | xargs -r -I{} kubectl patch {} -n {{ longhorn_namespace }} \
                -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null
          done
      changed_when: false
      failed_when: false

    # CNPG Database CRs use a deletion finalizer (`cnpg.io/deleteDatabase`) that the CNPG
    # operator must process. Stripping it manually unblocks namespace deletion after the operator is gone.
    - name: "Remove finalizers from CNPG Database CRs"
      ansible.builtin.shell:
        cmd: |
          kubectl get databases.postgresql.cnpg.io -n {{ namespace_postgres }} -o name 2>/dev/null \
            | xargs -r -I{} kubectl patch {} -n {{ namespace_postgres }} \
              -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null
      changed_when: false
      failed_when: false

    # Velero CRs (Backup, BackupStorageLocation, etc.) may also carry finalizers managed by the
    # Velero controller. Strip them before the namespace is deleted so termination doesn't hang.
    - name: "Remove finalizers from Velero CRs"
      ansible.builtin.shell:
        cmd: |
          kubectl get crd --no-headers 2>/dev/null | awk '{print $1}' \
            | grep '\.velero\.io$' | while read crd; do
            kubectl get "$crd" -n {{ velero_namespace }} -o name 2>/dev/null \
              | xargs -r -I{} kubectl patch {} -n {{ velero_namespace }} \
                -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null
          done
      changed_when: false
      failed_when: false

    # PVCs get a `kubernetes.io/pvc-protection` finalizer that is normally removed by the
    # controller only after all pods using the PVC are gone. Since we're force-wiping
    # namespaces, the controller may not get a chance to do so — strip it manually.
    - name: "Remove PVC protection finalizers from all homelab namespaces"
      ansible.builtin.shell:
        cmd: |
          for ns in {{ all_namespaces | join(' ') }}; do
            kubectl get pvc -n "$ns" -o name 2>/dev/null \
              | xargs -r -I{} kubectl patch {} -n "$ns" \
                -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null
          done
      changed_when: false
      failed_when: false

    # Delete app namespaces first; they hold PVCs backed by Longhorn volumes.
    # Deleting them before Longhorn ensures Longhorn can detach volumes while its controller is still running.
    - name: "Delete application namespaces"
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
      loop: "{{ apps | map(attribute='namespace') | list }}"
      loop_control:
        label: "{{ item }}"

    # Delete infra namespaces in one pass, but deliberately EXCLUDE longhorn-system here.
    # Longhorn must be the last namespace deleted so volumes have time to detach before
    # the controller dies — otherwise Longhorn leaves orphaned iSCSI sessions on the nodes,
    # which cause "disk apparently in use" errors on the next deploy.
    - name: "Delete infrastructure namespaces (except Longhorn — must wait for PVCs first)"
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
      loop:
        - "{{ namespace_postgres }}"
        - "{{ namespace_cnpg }}"
        - "{{ namespace_prometheus }}"
        - "{{ namespace_grafana }}"
        - "{{ namespace_loki }}"
        - "{{ namespace_gateway }}"
        - "{{ namespace_cert_manager }}"
        - "{{ namespace_metallb }}"
        - "{{ namespace_envoy }}"
        - "{{ velero_namespace }}"
      loop_control:
        label: "{{ item }}"

    # Pods stuck in Succeeded or Failed don't respond to normal SIGTERM-based deletion.
    # Force-delete them to unblock namespace termination which waits for all pods to be gone.
    - name: "Force-delete terminal pods blocking namespace termination"
      ansible.builtin.shell:
        cmd: |
          for ns in {{ all_namespaces | join(' ') }}; do
            kubectl get pods -n "$ns" \
              --field-selector='status.phase=Succeeded' -o name 2>/dev/null \
              | xargs -r kubectl delete --force --grace-period=0 -n "$ns" 2>/dev/null
            kubectl get pods -n "$ns" \
              --field-selector='status.phase=Failed' -o name 2>/dev/null \
              | xargs -r kubectl delete --force --grace-period=0 -n "$ns" 2>/dev/null
          done
      changed_when: false
      failed_when: false

    # The Velero controller sometimes re-adds finalizers to its own CRs during its shutdown sequence,
    # after we stripped them above. A second pass ensures those re-added finalizers are cleared
    # before the namespace termination loop below checks for completion.
    - name: "Re-strip Velero finalizers post-deletion (controller may have re-added them before shutdown)"
      ansible.builtin.shell:
        cmd: |
          kubectl get crd --no-headers 2>/dev/null | awk '{print $1}' \
            | grep '\.velero\.io$' | while read crd; do
            kubectl get "$crd" -n {{ velero_namespace }} -o name 2>/dev/null \
              | xargs -r -I{} kubectl patch {} -n {{ velero_namespace }} \
                -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null
          done
      changed_when: false
      failed_when: false

    # Block until every non-Longhorn namespace has fully terminated before proceeding to delete Longhorn.
    # This guarantees all PVC-using pods are gone and Longhorn has detached their volumes.
    - name: "Wait for all non-Longhorn namespaces to fully terminate"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
      register: ns_check
      until: ns_check.resources | length == 0
      retries: 60
      delay: 10
      loop: "{{ all_namespaces | reject('equalto', longhorn_namespace) | list }}"
      loop_control:
        label: "{{ item }}"

    # Only delete Longhorn AFTER all other namespaces are gone — volumes are now detached and
    # Longhorn can clean up cleanly without leaving orphaned iSCSI sessions.
    - name: "Delete Longhorn namespace (after all PVC-using namespaces terminated — prevents orphaned volumes)"
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ longhorn_namespace }}"

    # Wait for Longhorn to finish its own cleanup before removing CRDs.
    # Deleting CRDs while the namespace is still terminating can leave stale resource versions.
    - name: "Wait for Longhorn namespace to fully terminate"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ longhorn_namespace }}"
      register: ns_check
      until: ns_check.resources | length == 0
      retries: 60
      delay: 10

    # Longhorn CRDs embed a webhookClientConfig pointing to the now-deleted webhook service.
    # If left behind, the next `helm upgrade --install` fails because the CRD still references
    # the old (gone) webhook endpoint. Delete them so the next deploy starts from scratch.
    - name: "Delete Longhorn CRDs (stale webhookClientConfig causes re-install to fail)"
      ansible.builtin.shell:
        cmd: |
          kubectl get crd -o name 2>/dev/null | grep '\.longhorn\.io' \
            | xargs -r kubectl delete 2>/dev/null
      changed_when: false
      failed_when: false

    # Same reason as Longhorn CRDs above: CNPG CRDs embed webhookClientConfig pointing to the
    # deleted CNPG webhook service. Removing them ensures a clean re-install on next deploy.
    - name: "Delete CNPG CRDs (stale webhookClientConfig causes re-install to fail)"
      ansible.builtin.shell:
        cmd: |
          kubectl get crd -o name 2>/dev/null | grep '\.cnpg\.io\|\.postgresql\.cnpg\.io' \
            | xargs -r kubectl delete 2>/dev/null
      changed_when: false
      failed_when: false

    # Two-bucket rotation for CNPG barman-cloud recovery:
    #   homelab-cnpg        — stable recovery source (read on next deploy)
    #   homelab-cnpg-active — live WAL archive + base backup destination (written during cluster lifetime)
    #
    # On destroy we promote "active" → "stable" so the next deploy can recover from it,
    # then wipe "active" so barman-cloud-check-wal-archive sees an empty destination and passes.
    #
    # Without this rotation, both source and destination point to the same path and the
    # "Expected empty archive" safety check blocks recovery on every re-deploy.
    - name: "Promote active CNPG backup to stable recovery source (sync active → stable bucket)"
      ansible.builtin.shell:
        cmd: >
          aws s3 sync s3://{{ cnpg_active_bucket }}/
          s3://{{ cnpg_backup_bucket }}/
          --delete
          --endpoint-url {{ garage_s3_endpoint }}
          2>/dev/null || true
      changed_when: false
      failed_when: false

    - name: "Clear active CNPG bucket (empty destination required by barman-cloud-check-wal-archive on next deploy)"
      ansible.builtin.shell:
        cmd: >
          aws s3 rm s3://{{ cnpg_active_bucket }}/
          --recursive
          --endpoint-url {{ garage_s3_endpoint }}
          2>/dev/null || true
      changed_when: false
      failed_when: false
